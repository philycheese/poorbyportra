<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Photos — Poorbyportra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <header class="page-header">
            <div class="breadcrumb">
                <span class="crumb"><a href="index.html">Poorbyportra</a></span>
                <span class="crumb crumb-active"><h1>Photos</h1></span>
            </div>
            <div class="header-actions">
                <button data-filter="all" class="filter-btn active" type="button">All</button>
                <button data-filter="landscape" class="filter-btn" type="button">Landscape</button>
                <button id="sort-toggle" class="action-btn" type="button" title="Toggle sort order">
                    <span class="action-btn-label">Sort</span>
                    <span class="action-btn-arrow" id="sort-arrow">↓</span>
                </button>
            </div>
        </header>

        <section id="image-grid" class="image-grid"></section>

        <div id="empty-state" class="empty-state" hidden>No photos match this filter.</div>
    </main>

    <div id="spinner" class="spinner" hidden></div>

    <div id="modal" class="modal" aria-hidden="true">
        <button class="modal-close" aria-label="Close">×</button>
        <button class="modal-nav modal-nav-prev" aria-label="Previous">‹</button>
        <button class="modal-nav modal-nav-next" aria-label="Next">›</button>
        <div class="modal-stage">
            <img class="modal-image" id="modal-image" alt="">
        </div>
        <div class="modal-caption" id="modal-caption"></div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="406b2854-4498-4aec-bb01-87c014bbe6af"></script>
</body>
</html>
