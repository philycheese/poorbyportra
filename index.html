    <script>
        (() => {
            const list = window.PORTRA_IMAGES || [];
            if (!list.length) return;
            const pick = list[Math.floor(Math.random() * list.length)];
            const img = document.getElementById('home-feature-image');
            const link = document.getElementById('home-feature-link');
            if (!img || !link) return;
            img.src = 'https://res.cloudinary.com/dyy8mqxwi/image/upload/w_800,q_auto,f_auto/v1753994362/' + pick.filename;
            img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
            link.href = 'photos.html#' + encodeURIComponent(pick.filename);
        })();
    </script>
